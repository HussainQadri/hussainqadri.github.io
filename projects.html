title: Projects
permalink: /projects/

<h1>Projects</h1>

{% assign sorted_projects = site.projects | sort: "order" %}

<ul class="clean-list">
  {% for project in sorted_projects %}
    <li>
      <strong><a href="{{ project.url | relative_url }}">{{ project.title }}</a></strong><br>
      {{ project.summary }}
    </li>
  {% endfor %}
</ul>
